<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- 🔥 WAJIB UNTUK HP -->
    <title>Upload Bukti Transfer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="card">
        <h1>RAJAWANGI</h1>
        <p class="subtitle">Upload Bukti Transfer</p>

        <!-- TANGGAL -->
        <input type="date" id="tanggal">

        <!-- DESKRIPSI -->
        <textarea id="deskripsi" placeholder="Masukkan deskripsi..." rows="3"></textarea>

        <!-- PILIH FILE -->
        <div class="upload-box">
            <input type="file" id="foto" accept="image/*" onchange="previewImage()">
            <p>Pilih Foto Bukti Transfer</p>
        </div>

        <!-- 🔥 CAMERA SECTION (DIRAPIKAN) -->
        <div class="camera-section">
            <button onclick="bukaKamera()" class="btn-kamera">📸 Ambil Foto</button>

            <video id="video" autoplay style="display:none;"></video>
            <canvas id="canvas" style="display:none;"></canvas>

            <button onclick="ambilFoto()" id="btnAmbil" style="display:none;">Ambil Gambar</button>
        </div>

        <!-- PREVIEW -->
        <img id="preview" src="" alt="Preview" style="display:none;">

        <!-- ACTION BUTTON -->
        <button onclick="hapusFoto()" class="btn-hapus">Hapus Foto</button>
        <button onclick="uploadData()" class="btn-upload">Upload Sekarang</button>

        <p id="status"></p>
    </div>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbyyfByUdgDb_ldrHrZeFzM7c8Y5fq1jqaI5CcKtrlmCOM6FJVFSt70oOL4hLTkK3pEn/exec";

let stream = null;
let fotoBase64 = null;

// 🔹 PREVIEW FILE
function previewImage() {
    let file = document.getElementById("foto").files[0];
    let preview = document.getElementById("preview");

    if (file) {
        let reader = new FileReader();
        reader.onloadend = function() {
            fotoBase64 = reader.result;
            preview.src = fotoBase64;
            preview.style.display = "block";
        }
        reader.readAsDataURL(file);
    }
}

// 🔹 BUKA KAMERA
function bukaKamera() {
    let video = document.getElementById("video");
    let btn = document.getElementById("btnAmbil");

    navigator.mediaDevices.getUserMedia({ video: true })
    .then(s => {
        stream = s;
        video.srcObject = stream;
        video.style.display = "block";
        btn.style.display = "block";
    })
    .catch(() => {
        alert("Tidak bisa akses kamera!");
    });
}

// 🔹 AMBIL FOTO
function ambilFoto() {
    let video = document.getElementById("video");
    let canvas = document.getElementById("canvas");
    let preview = document.getElementById("preview");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    let ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0);

    fotoBase64 = canvas.toDataURL("image/png");

    preview.src = fotoBase64;
    preview.style.display = "block";

    // matikan kamera
    stream.getTracks().forEach(track => track.stop());
    video.style.display = "none";
    document.getElementById("btnAmbil").style.display = "none";
}

// 🔹 HAPUS FOTO
function hapusFoto() {
    document.getElementById("foto").value = "";
    document.getElementById("preview").style.display = "none";
    fotoBase64 = null;
    document.getElementById("status").innerText = "🗑️ Foto dihapus!";
}

// 🔹 RESET
function resetForm() {
    document.getElementById("tanggal").value = "";
    document.getElementById("deskripsi").value = "";
    document.getElementById("foto").value = "";
    document.getElementById("preview").style.display = "none";
    fotoBase64 = null;
}

// 🔹 UPLOAD
function uploadData() {
    let tanggal = document.getElementById("tanggal").value;
    let deskripsi = document.getElementById("deskripsi").value;
    let status = document.getElementById("status");

    if (!tanggal || !fotoBase64) {
        alert("Lengkapi data!");
        return;
    }

    status.innerText = "⏳ Uploading...";

    let formData = new FormData();
    formData.append("tanggal", tanggal);
    formData.append("deskripsi", deskripsi);
    formData.append("foto", fotoBase64);

    fetch(scriptURL, {
        method: "POST",
        body: formData
    })
    .then(res => res.text())
    .then(() => {
        status.innerText = "✅ Berhasil upload!";
        resetForm();
    })
    .catch(() => {
        status.innerText = "❌ Gagal upload!";
    });
}
</script>

</body>
</html>
